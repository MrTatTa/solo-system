<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 text-white min-h-screen"
  >
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- CONTENT -->
    <div class="max-w-5xl mx-auto px-6 py-8" id="app"></div>

    <script type="module">
      import { loadComponent } from "./assets/js/app.js";
      import { renderInventory } from "./assets/js/ui/inventoryUI.js";

      loadComponent("navbar", "components/navbar.html");

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("app").innerHTML = `
        
        <!-- HEADER -->
        <div class="mb-6">
          <h1 class="text-3xl font-bold">🎒 Inventory</h1>
          <p class="text-gray-400 text-sm">Your collected items</p>
        </div>

        <!-- LIST -->
        <div id="inventoryList" class="grid md:grid-cols-3 gap-4"></div>

      `;

        renderInventory();
      });
    </script>
  </body>
</html>
