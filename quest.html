<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Daily Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </head>

  <body
    class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 text-white min-h-screen"
  >
    <audio id="bgm" loop>
      <source src="assets/audio/bgm.mp3" type="audio/mpeg" />
    </audio>
    <!-- Pop-up Toast -->
    <div id="rewardPopupContainer"></div>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- CONTENT -->
    <div class="max-w-5xl mx-auto px-6 py-8" id="app"></div>

    <script type="module">
      import { loadComponent } from "./assets/js/app.js";
      import { initDailyQuest } from "./assets/js/modules/dailyQuest.js";
      import { renderQuests } from "./assets/js/ui/questUI.js";

      loadComponent("navbar", "components/navbar.html");
      loadComponent("rewardPopupContainer", "components/rewardPopup.html");

      document.addEventListener("DOMContentLoaded", () => {
        initDailyQuest();

        document.getElementById("app").innerHTML = `
        <!-- HEADER -->
        <div class="mb-6">
          <h1 class="text-3xl font-bold">⚔️ Daily Quest</h1>
          <p class="text-gray-400 text-sm">Complete your missions today</p>
        </div>

        <!-- SUMMARY -->
        <div id="questForm"></div>
        <div id="questSummary" class="mb-6"></div>

        <!-- QUEST LIST -->
        <div id="questList"></div>
      `;

        renderQuests();
      });
    </script>
    <script type="module" src="./assets/js/modules/audio.js"></script>
  </body>
</html>
