<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Solo Leveling System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </head>

  <body
    class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 text-white min-h-screen"
  >
    <audio id="bgm" loop>
      <source src="assets/audio/bgm.mp3" type="audio/mpeg" />
    </audio>
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- CONTENT -->
    <div class="max-w-6xl mx-auto px-6 py-8">
      <!-- Title -->
      <div class="mb-6">
        <h1 class="text-3xl font-bold">Dashboard</h1>
        <p class="text-gray-400 text-sm">
          Track your progress & become stronger
        </p>
      </div>

      <!-- Dashboard -->
      <div id="dashboard"></div>
    </div>

    <script type="module">
      import { loadComponent } from "./assets/js/app.js";
      import { renderDashboard } from "./assets/js/ui/dashboardUI.js";

      loadComponent("navbar", "components/navbar.html");

      document.addEventListener("DOMContentLoaded", () => {
        renderDashboard();
      });
    </script>
    <script type="module" src="./assets/js/modules/audio.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
